name: Generate note draft

on:
  workflow_dispatch:
    inputs:
      memo:
        description: "Memo from Slack"
        required: false
        default: ""
      platforms:
        description: "Platform selection (note/instagram/x/all)"
        required: false
        default: "all"
  repository_dispatch:
    types: [generate-note]
  schedule:
    - cron: "0 0 * * *" # Japan time 09:00

jobs:
  generate-note:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_MEMO: ${{ github.event.inputs.memo || github.event.client_payload.memo || '' }}
          INPUT_PLATFORMS: ${{ github.event.inputs.platforms || github.event.client_payload.platforms || 'all' }}
        run: python scripts/generate_posts.py

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drafts/
          git diff --cached --quiet || git commit -m "feat: auto-generate posts $(date +'%Y-%m-%d')"
          git push

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MESSAGE="✅ 記事生成が完了しました ($(date +'%Y-%m-%d'))"
          else
            MESSAGE="❌ 記事生成に失敗しました ($(date +'%Y-%m-%d'))"
          fi
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"$MESSAGE\"}" \
            "$SLACK_WEBHOOK_URL"
